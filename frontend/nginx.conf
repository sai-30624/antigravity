server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # In Railway, the backend will have a URL like backend.railway.internal
    # But for a simple setup, we can also use the absolute URL in the frontend.
    # However, this config makes the frontend container more robust.
}
